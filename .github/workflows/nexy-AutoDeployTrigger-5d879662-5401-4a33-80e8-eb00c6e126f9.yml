name: Trigger auto deployment for nexy

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/nexy-AutoDeployTrigger-5d879662-5401-4a33-80e8-eb00c6e126f9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "🔍 Debug Environment Info:"
          echo "GitHub Workspace: ${{ github.workspace }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Architecture: ${{ runner.arch }}"
          ls -la
          echo "--- Dockerfile content ---"
          cat Dockerfile || echo "Dockerfile not found"
          echo "--- requirements.txt content ---"
          cat requirements.txt || echo "requirements.txt not found"

      - name: Check Azure credentials
        run: |
          echo "🔍 Checking Azure credentials..."
          if [ -z "${{ secrets.NEXY_AZURE_CLIENT_ID }}" ]; then
            echo "❌ NEXY_AZURE_CLIENT_ID is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXY_AZURE_TENANT_ID }}" ]; then
            echo "❌ NEXY_AZURE_TENANT_ID is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "❌ NEXY_AZURE_SUBSCRIPTION_ID is missing"
            exit 1
          fi
          echo "✅ All Azure credentials are present"

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.NEXY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.NEXY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}

      - name: Test Azure CLI
        run: |
          echo "🔍 Testing Azure CLI..."
          az --version
          az account show --output table
          echo "✅ Azure CLI working"

      - name: Test Docker
        run: |
          echo "🔍 Testing Docker..."
          docker --version
          docker info --format "table"
          echo "✅ Docker working"

      - name: Check Container Registry nexy1
        run: |
          echo "🔍 Checking Container Registry nexy1..."
          az acr show --name nexy1 --resource-group Nexy --output table || echo "❌ Container Registry nexy1 not found in resource group Nexy"
          echo "🔍 Checking all Container Registries in subscription..."
          az acr list --output table || echo "⚠️ No Container Registries found in subscription"
          echo "🔍 Testing ACR login..."
          az acr login --name nexy1 || echo "⚠️ Cannot login to ACR nexy1"

      - name: Deploy with Container Registry nexy1
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          containerAppName: nexy
          resourceGroup: Nexy
          runtimeStack: python
          targetPort: 80
          imageToBuild: nexy:${{ github.sha }}
          disableTelemetry: true
          # Используем существующий Container Registry nexy1
          acrName: nexy1

      - name: Success Message
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Container App: nexy"
          echo "📁 Resource Group: Nexy"
          echo "🐳 Image: nexy:${{ github.sha }}"


