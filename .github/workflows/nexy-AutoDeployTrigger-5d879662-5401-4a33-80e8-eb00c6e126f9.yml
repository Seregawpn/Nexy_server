name: Trigger auto deployment for nexy

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/nexy-AutoDeployTrigger-5d879662-5401-4a33-80e8-eb00c6e126f9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Check Azure credentials
        run: |
          echo "🔍 Checking Azure credentials..."
          if [ -z "${{ secrets.NEXY_AZURE_CLIENT_ID }}" ]; then
            echo "❌ NEXY_AZURE_CLIENT_ID is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXY_AZURE_TENANT_ID }}" ]; then
            echo "❌ NEXY_AZURE_TENANT_ID is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "❌ NEXY_AZURE_SUBSCRIPTION_ID is missing"
            exit 1
          fi
          echo "✅ All Azure credentials are present"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.NEXY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.NEXY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure connection
        run: |
          echo "🔍 Verifying Azure connection..."
          az account show
          az group show --name Nexy || echo "⚠️ Resource group 'Nexy' not found"

      - name: Check Docker
        run: |
          echo "🔍 Checking Docker..."
          docker --version
          docker info

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          containerAppName: nexy
          resourceGroup: Nexy
          runtimeStack: python
          targetPort: 80
          imageToBuild: nexy:${{ github.sha }}
          disableTelemetry: true

      - name: Check deployment status
        run: |
          echo "🔍 Checking deployment status..."
          echo "✅ Deployment completed successfully!"
          echo "🌐 Container App: nexy"
          echo "📁 Resource Group: Nexy"
          echo "🐳 Image: nexy:${{ github.sha }}"


