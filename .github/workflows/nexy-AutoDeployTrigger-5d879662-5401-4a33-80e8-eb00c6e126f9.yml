name: Trigger auto deployment for nexy

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/nexy-AutoDeployTrigger-5d879662-5401-4a33-80e8-eb00c6e126f9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "🔍 Debug Environment Info:"
          echo "GitHub Workspace: ${{ github.workspace }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Architecture: ${{ runner.arch }}"
          ls -la
          echo "--- Dockerfile content ---"
          cat Dockerfile || echo "Dockerfile not found"
          echo "--- requirements.txt content ---"
          cat requirements.txt || echo "requirements.txt not found"

      - name: Check Azure credentials
        run: |
          echo "🔍 Checking Azure credentials..."
          if [ -z "${{ secrets.NEXY_AZURE_CLIENT_ID }}" ]; then
            echo "❌ NEXY_AZURE_CLIENT_ID is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXY_AZURE_TENANT_ID }}" ]; then
            echo "❌ NEXY_AZURE_TENANT_ID is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "❌ NEXY_AZURE_SUBSCRIPTION_ID is missing"
            exit 1
          fi
          echo "✅ All Azure credentials are present"

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.NEXY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.NEXY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}

      - name: Test Azure CLI
        run: |
          echo "🔍 Testing Azure CLI..."
          az --version
          az account show --output table
          echo "✅ Azure CLI working"

      - name: Test Docker
        run: |
          echo "🔍 Testing Docker..."
          docker --version
          docker info --format "table"
          echo "✅ Docker working"

      - name: Check Container Registry nexy1
        run: |
          echo "🔍 Checking Container Registry nexy1..."
          az acr show --name nexy1 --resource-group Nexy --output table || echo "❌ Container Registry nexy1 not found in resource group Nexy"
          echo "🔍 Checking all Container Registries in subscription..."
          az acr list --output table || echo "⚠️ No Container Registries found in subscription"
          echo "🔍 Testing ACR login..."
          az acr login --name nexy1 || echo "⚠️ Cannot login to ACR nexy1"

      - name: Debug Container App Configuration
        run: |
          echo "🔍 Debugging Container App 'nexy' configuration..."
          echo "--- Container App details ---"
          az containerapp show --name nexy --resource-group Nexy --query "properties.template.containers[0].image" -o tsv || echo "No image found"
          echo "--- Container App full config ---"
          az containerapp show --name nexy --resource-group Nexy --query "properties.template.containers[0]" -o json || echo "No container config found"
          echo "--- Environment details ---"
          az containerapp env show --name managedEnvironment-Nexy-b374 --resource-group Nexy --query "properties.appLogsConfiguration" -o json || echo "No environment config found"

      - name: Get ACR credentials
        run: |
          echo "🔍 Getting ACR credentials..."
          ACR_USERNAME=$(az acr credential show --name nexy1 --query "username" -o tsv)
          ACR_PASSWORD=$(az acr credential show --name nexy1 --query "passwords[0].value" -o tsv)
          echo "ACR Username: $ACR_USERNAME"
          echo "ACR Password: ${ACR_PASSWORD:0:10}..." # Показываем только первые 10 символов
          echo "::set-output name=username::$ACR_USERNAME"
          echo "::set-output name=password::$ACR_PASSWORD"
        id: acr-credentials

      - name: Force update Container App registry
        run: |
          echo "🔧 Force updating Container App registry configuration..."
          # Принудительно обновляем Container App с правильным Container Registry
          az containerapp update \
            --name nexy \
            --resource-group Nexy \
            --image nexy1.azurecr.io/nexy:${{ github.sha }} \
            --registry-server nexy1.azurecr.io \
            --registry-username ${{ steps.acr-credentials.outputs.username }} \
            --registry-password ${{ steps.acr-credentials.outputs.password }} \
            --output none || echo "⚠️ Failed to force update registry"

      - name: Deploy with minimal configuration
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile
          containerAppName: nexy
          resourceGroup: Nexy
          runtimeStack: python
          targetPort: 80
          imageToBuild: nexy:${{ github.sha }}
          disableTelemetry: true
          # Минимальная конфигурация без Container Registry

      - name: Success Message
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Container App: nexy"
          echo "📁 Resource Group: Nexy"
          echo "🐳 Image: nexy:${{ github.sha }}"


