name: Trigger auto deployment for nexy

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/nexy-deploy.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "🔍 Debug Environment Info:"
          echo "GitHub Workspace: ${{ github.workspace }}"
          
          # Присваиваем GitHub переменные в Bash переменные
          GITHUB_SHA="${{ github.sha }}"
          GITHUB_REF="${{ github.ref }}"
          
          echo "GitHub SHA: '${GITHUB_SHA}' (length: ${#GITHUB_SHA})"
          echo "GitHub Ref: '${GITHUB_REF}'"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Architecture: ${{ runner.arch }}"
          
          # Проверяем критически важные переменные
          if [ -z "${GITHUB_SHA}" ]; then
            echo "❌ CRITICAL ERROR: github.sha is empty!"
            exit 1
          fi
          
          if [ ${#GITHUB_SHA} -lt 10 ]; then
            echo "❌ CRITICAL ERROR: github.sha too short: '${GITHUB_SHA}'"
            exit 1
          fi
          
          echo "✅ GitHub variables are valid"
          ls -la
          echo "--- Dockerfile content ---"
          cat Dockerfile || echo "Dockerfile not found"
          echo "--- requirements.txt content ---"
          cat requirements.txt || echo "requirements.txt not found"

      - name: Check Azure credentials
        run: |
          echo "🔍 Checking Azure credentials..."
          echo "📋 Required secrets:"
          echo "   - NEXY_AZURE_CLIENT_ID: ${{ secrets.NEXY_AZURE_CLIENT_ID != '' && '✅ Set' || '❌ Missing' }}"
          echo "   - NEXY_AZURE_TENANT_ID: ${{ secrets.NEXY_AZURE_TENANT_ID != '' && '✅ Set' || '❌ Missing' }}"
          echo "   - NEXY_AZURE_SUBSCRIPTION_ID: ${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID != '' && '✅ Set' || '❌ Missing' }}"
          
          if [ -z "${{ secrets.NEXY_AZURE_CLIENT_ID }}" ] || [ -z "${{ secrets.NEXY_AZURE_TENANT_ID }}" ] || [ -z "${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}" ]; then
            echo ""
            echo "🚨 MISSING AZURE SECRETS!"
            echo "Please add the following secrets in your GitHub repository:"
            echo "   Settings → Secrets and variables → Actions"
            echo ""
            echo "Required secrets:"
            echo "   - NEXY_AZURE_CLIENT_ID"
            echo "   - NEXY_AZURE_TENANT_ID"
            echo "   - NEXY_AZURE_SUBSCRIPTION_ID"
            echo ""
            echo "These can be obtained from your Azure App Registration."
            exit 1
          fi
          
          echo "✅ All Azure credentials are present"

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.NEXY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.NEXY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.NEXY_AZURE_SUBSCRIPTION_ID }}

      - name: Test Azure CLI
        run: |
          echo "🔍 Testing Azure CLI..."
          az --version
          az account show --output table
          echo "✅ Azure CLI working"

      - name: Test Docker
        run: |
          echo "🔍 Testing Docker..."
          docker --version
          docker info --format "table"
          echo "✅ Docker working"

      - name: Check Container Registry nexy1
        run: |
          echo "🔍 Checking Container Registry nexy1..."
          az acr show --name nexy1 --resource-group Nexy --output table || echo "❌ Container Registry nexy1 not found in resource group Nexy"
          echo "🔍 Checking all Container Registries in subscription..."
          az acr list --output table || echo "⚠️ No Container Registries found in subscription"
          echo "🔍 Testing ACR login..."
          az acr login --name nexy1 || echo "⚠️ Cannot login to ACR nexy1"

      - name: Debug Container App Configuration
        run: |
          echo "🔍 Debugging Container App 'nexy' configuration..."
          echo "--- Container App details ---"
          az containerapp show --name nexy --resource-group Nexy --query "properties.template.containers[0].image" -o tsv || echo "No image found"
          echo "--- Container App full config ---"
          az containerapp show --name nexy --resource-group Nexy --query "properties.template.containers[0]" -o json || echo "No container config found"
          echo "--- Environment details ---"
          az containerapp env show --name managedEnvironment-Nexy-b374 --resource-group Nexy --query "properties.appLogsConfiguration" -o json || echo "No environment config found"

      - name: Enable ACR admin access
        run: |
          echo "🔧 Enabling admin access for Container Registry nexy1..."
          az acr update -n nexy1 --admin-enabled true
          echo "✅ Admin access enabled"

      - name: Get ACR credentials
        run: |
          echo "🔍 Getting ACR credentials..."
          ACR_USERNAME=$(az acr credential show --name nexy1 --query "username" -o tsv)
          ACR_PASSWORD=$(az acr credential show --name nexy1 --query "passwords[0].value" -o tsv)
          echo "ACR Username: $ACR_USERNAME"
          echo "ACR Password: ${ACR_PASSWORD:0:10}..." # Показываем только первые 10 символов
          echo "username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "password=$ACR_PASSWORD" >> $GITHUB_OUTPUT
        id: acr-credentials

      - name: Build and push to ACR
        run: |
          echo "🔧 Building and pushing Docker image to ACR..."
          echo "🔍 Current directory: $(pwd)"
          echo "🔍 Files in directory:"
          
          # Присваиваем GitHub переменные в Bash переменные
          GITHUB_SHA="${{ github.sha }}"
          
          # Строгая проверка GITHUB_SHA
          echo "🔍 Verifying GITHUB_SHA before build..."
          echo "GITHUB_SHA: '${GITHUB_SHA}' (length: ${#GITHUB_SHA})"
          
          if [ -z "${GITHUB_SHA}" ]; then
            echo "❌ CRITICAL ERROR: GITHUB_SHA is empty!"
            exit 1
          fi
          
          if [ ${#GITHUB_SHA} -ne 40 ]; then
            echo "❌ CRITICAL ERROR: GITHUB_SHA must be exactly 40 characters (full commit SHA)"
            echo "Current length: ${#GITHUB_SHA}"
            echo "Expected: 40 characters"
            exit 1
          fi
          
          echo "✅ GITHUB_SHA is valid: ${GITHUB_SHA}"
          
          ls -la
          
          # Логинимся в ACR
          echo "🔍 Logging into ACR nexy1..."
          az acr login --name nexy1
          
          # Проверяем Dockerfile
          echo "🔍 Checking Dockerfile..."
          if [ -f "Dockerfile" ]; then
            echo "✅ Dockerfile found"
            cat Dockerfile
          else
            echo "❌ Dockerfile not found!"
            exit 1
          fi
          
          # Собираем образ
          echo "🔍 Building Docker image..."
          echo "Image tag: nexy1.azurecr.io/nexy:${GITHUB_SHA}"
          docker build -t nexy1.azurecr.io/nexy:${GITHUB_SHA} .
          
          # Проверяем, что образ создался
          echo "🔍 Checking built image..."
          if docker images | grep -q "nexy1.azurecr.io/nexy"; then
            echo "✅ Docker image built successfully"
            docker images | grep "nexy1.azurecr.io/nexy"
          else
            echo "❌ Docker image build failed!"
            echo "🔍 Available images:"
            docker images
            exit 1
          fi
          
          # Пушим в ACR
          echo "🔍 Pushing image to ACR..."
          docker push nexy1.azurecr.io/nexy:${GITHUB_SHA}
          
          # Проверяем, что образ появился в ACR
          echo "🔍 Verifying image in ACR..."
          az acr repository show --name nexy1 --image nexy:${GITHUB_SHA} || echo "⚠️ Image not found in ACR"
          
          echo "✅ Image built and pushed to ACR"

      - name: Verify variables and image before deployment
        run: |
          echo "🔍 Verifying variables and image before deployment..."
          
          # Присваиваем GitHub переменные в Bash переменные
          GITHUB_SHA="${{ github.sha }}"
          GITHUB_REF="${{ github.ref }}"
          GITHUB_WORKFLOW="${{ github.workflow }}"
          
          # Проверяем github.sha
          if [ -z "${GITHUB_SHA}" ]; then
            echo "❌ ERROR: github.sha is empty!"
            echo "🔍 GitHub context variables:"
            echo "   - github.sha: '${GITHUB_SHA}'"
            echo "   - github.ref: '${GITHUB_REF}'"
            echo "   - github.workflow: '${GITHUB_WORKFLOW}'"
            exit 1
          fi
          
          # Проверяем, что github.sha точно 40 символов (полный commit SHA)
          if [ ${#GITHUB_SHA} -ne 40 ]; then
            echo "❌ ERROR: github.sha must be exactly 40 characters (full commit SHA)"
            echo "Current length: ${#GITHUB_SHA}"
            echo "Expected: 40 characters"
            exit 1
          fi
          
          echo "✅ github.sha is valid: ${GITHUB_SHA}"
          
          # Формируем полный путь к образу
          FULL_IMAGE_PATH="nexy1.azurecr.io/nexy:${GITHUB_SHA}"
          echo "🔍 Full image path: $FULL_IMAGE_PATH"
          
          # Проверяем, что образ существует в ACR
          IMAGE_TAG="nexy:${GITHUB_SHA}"
          echo "🔍 Checking for image: $IMAGE_TAG"
          
          if az acr repository show --name nexy1 --image "$IMAGE_TAG" >/dev/null 2>&1; then
            echo "✅ Image $IMAGE_TAG found in ACR nexy1"
          else
            echo "❌ Image $IMAGE_TAG NOT found in ACR nexy1!"
            echo "🔍 Available images in ACR:"
            az acr repository list --name nexy1
            echo "🔍 Available tags for nexy repository:"
            az acr repository show-tags --name nexy1 --repository nexy
            exit 1
          fi

      - name: Deploy Container App
        run: |
          echo "🚀 Deploying Container App..."
          
          # Присваиваем GitHub переменные в Bash переменные (на всякий случай)
          GITHUB_SHA="${{ github.sha }}"
          
          # Финальная проверка перед деплоем
          echo "🔍 Final verification before deployment..."
          echo "GITHUB_SHA: '${GITHUB_SHA}' (length: ${#GITHUB_SHA})"
          echo "Full image path: nexy1.azurecr.io/nexy:${GITHUB_SHA}"
          
          if [ -z "${GITHUB_SHA}" ]; then
            echo "❌ CRITICAL ERROR: GITHUB_SHA is empty before deployment!"
            exit 1
          fi
          
          if [ ${#GITHUB_SHA} -ne 40 ]; then
            echo "❌ CRITICAL ERROR: GITHUB_SHA must be exactly 40 characters before deployment!"
            echo "Current length: ${#GITHUB_SHA}"
            exit 1
          fi
          
          # Деплоим Container App с готовым образом
          az containerapp update \
            --name nexy \
            --resource-group Nexy \
            --image nexy1.azurecr.io/nexy:${GITHUB_SHA} \
            --output none
          
          echo "✅ Container App deployed successfully"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          
          # Присваиваем GitHub переменные в Bash переменные (на всякий случай)
          GITHUB_SHA="${{ github.sha }}"
          
          # Проверяем, что Container App обновился
          CURRENT_IMAGE=$(az containerapp show --name nexy --resource-group Nexy --query "properties.template.containers[0].image" -o tsv)
          echo "Current image: $CURRENT_IMAGE"
          echo "Expected image: nexy1.azurecr.io/nexy:${GITHUB_SHA}"
          echo "GITHUB_SHA used: '${GITHUB_SHA}' (length: ${#GITHUB_SHA})"
          
          if [[ "$CURRENT_IMAGE" == "nexy1.azurecr.io/nexy:${GITHUB_SHA}" ]]; then
            echo "✅ Deployment verified successfully!"
          else
            echo "⚠️ Image mismatch - deployment may have failed"
            echo "🔍 Debug info:"
            echo "   Current: '$CURRENT_IMAGE'"
            echo "   Expected: 'nexy1.azurecr.io/nexy:${GITHUB_SHA}'"
            echo "   GITHUB_SHA: '${GITHUB_SHA}'"
          fi

      - name: Success Message
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Container App: nexy"
          echo "📁 Resource Group: Nexy"
          echo "🐳 Image: nexy:${GITHUB_SHA}"


